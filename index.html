<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Create a Birthday Surprise 🎂</title>
<meta name="description" content="Create a stunning 3D birthday surprise for someone you love. Customize the name, message and share instantly on WhatsApp."/>
<meta property="og:title" content="Create a Birthday Surprise 🎂"/>
<meta property="og:description" content="Send a magical 3D birthday card to someone special!"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Nunito:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0014;--surface:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.12);
  --accent1:#ff3cac;--accent2:#784ba0;--accent3:#2b86c5;--gold:#ffd700;
  --text:#f0e6ff;--muted:#b09ec9;
}
html{scroll-behavior:smooth}
body{background:var(--bg);min-height:100vh;font-family:'Nunito',sans-serif;color:var(--text);overflow-x:hidden}
.bg-wrap{position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 120% 80% at 20% 10%,#3d0066 0%,transparent 55%),
             radial-gradient(ellipse 80% 100% at 80% 90%,#001a40 0%,transparent 55%),
             #0d0014}
.stars{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.5)}}
header{position:relative;z-index:10;text-align:center;padding:3rem 1rem 1.5rem}
.eyebrow{font-size:.75rem;letter-spacing:.3em;text-transform:uppercase;color:var(--accent1);font-weight:700;margin-bottom:1rem;animation:fadeUp .6s ease both}
.h-title{font-family:'Abril Fatface',serif;font-size:clamp(2.2rem,6vw,4.5rem);line-height:1.05;
  background:linear-gradient(135deg,#ff3cac,#ffd700,#2b86c5,#ff3cac);background-size:300% 300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:gradShift 5s ease infinite,fadeUp .7s .1s ease both}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.h-sub{color:var(--muted);font-size:1rem;margin-top:.8rem;animation:fadeUp .7s .2s ease both;opacity:0;animation-fill-mode:both}
.card{position:relative;z-index:10;max-width:560px;margin:0 auto;padding:2rem 1.5rem}
.form-card{
  background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:24px;
  padding:2.2rem;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  box-shadow:0 0 0 1px rgba(255,60,172,.1),0 40px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.1);
  transform-style:preserve-3d;transition:transform .1s ease;
  animation:fadeUp .7s .3s ease both;opacity:0;animation-fill-mode:both}
.field{margin-bottom:1.6rem}
.field label{display:block;font-size:.8rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent1);margin-bottom:.55rem}
.field input,.field textarea{
  width:100%;background:rgba(255,255,255,.06);border:1.5px solid var(--border);border-radius:12px;
  color:#fff;font-family:'Nunito',sans-serif;font-size:1rem;padding:.85rem 1.1rem;
  outline:none;transition:border-color .25s,box-shadow .25s,background .25s;resize:none}
.field input::placeholder,.field textarea::placeholder{color:rgba(255,255,255,.3)}
.field input:focus,.field textarea:focus{border-color:var(--accent1);background:rgba(255,60,172,.07);box-shadow:0 0 0 4px rgba(255,60,172,.15)}
.photo-upload{border:2px dashed var(--border);border-radius:14px;padding:1.8rem;text-align:center;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.photo-upload:hover{border-color:var(--accent1);background:rgba(255,60,172,.05)}
.photo-upload input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-preview{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--accent1);margin:0 auto .6rem;display:none;box-shadow:0 0 20px rgba(255,60,172,.5)}
.upload-icon{font-size:2.5rem;margin-bottom:.5rem;display:block}
.upload-text{font-size:.88rem;color:var(--muted)}
.upload-text strong{color:var(--accent1)}
.swatch-row{display:flex;gap:.7rem;flex-wrap:wrap;margin-top:.4rem}
.swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .2s,border-color .2s;position:relative}
.swatch::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.75rem;color:#fff;opacity:0;transition:opacity .2s}
.swatch.active{border-color:#fff;transform:scale(1.2)}
.swatch.active::after{opacity:1}
.btn-group{display:flex;gap:.8rem;flex-wrap:wrap;margin-top:.5rem}
.btn{flex:1;min-width:140px;display:flex;align-items:center;justify-content:center;gap:.5rem;
  padding:.95rem 1.5rem;border:none;border-radius:12px;font-family:'Nunito',sans-serif;
  font-size:1rem;font-weight:700;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 60%)}
.btn-primary{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#fff;box-shadow:0 8px 30px rgba(255,60,172,.4)}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(255,60,172,.55)}
.btn-primary:active{transform:scale(.97)}
.btn-wa{background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;box-shadow:0 8px 30px rgba(37,211,102,.35)}
.btn-wa:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(37,211,102,.5)}
.btn-wa:active{transform:scale(.97)}
.wa-section{margin-top:1.5rem;background:rgba(37,211,102,.07);border:1px solid rgba(37,211,102,.2);border-radius:14px;padding:1.2rem;text-align:center;display:none}
.wa-section p{font-size:.88rem;color:var(--muted);margin-bottom:.8rem;line-height:1.5}
.wa-link-box{background:rgba(0,0,0,.3);border-radius:8px;padding:.6rem 1rem;font-size:.78rem;color:#7ee8a2;word-break:break-all;margin-bottom:.8rem}
.divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,var(--border),transparent)}
.divider span{font-size:.75rem;color:var(--muted);letter-spacing:.1em;white-space:nowrap}
footer{position:relative;z-index:10;text-align:center;padding:2rem;font-size:.78rem;color:rgba(255,255,255,.2)}
.toast-wrap{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:.5rem;align-items:center}
.toast{background:rgba(10,0,20,.92);border:1px solid var(--border);color:#fff;font-size:.9rem;font-family:'Nunito',sans-serif;padding:.65rem 1.5rem;border-radius:999px;white-space:nowrap;box-shadow:0 6px 30px rgba(0,0,0,.4);animation:toastIn .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes toastIn{from{opacity:0;transform:translateY(14px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
@media(max-width:480px){.form-card{padding:1.4rem}.btn-group{flex-direction:column}.btn{min-width:unset}}
</style>
</head>
<body>
<div class="bg-wrap" aria-hidden="true"></div>
<div class="stars" id="stars" aria-hidden="true"></div>

<header>
  <p class="eyebrow">✦ Birthday Magic Maker ✦</p>
  <h1 class="h-title">Create a Surprise</h1>
  <p class="h-sub">Fill in the details — we'll craft a breathtaking 3D birthday experience 🎂</p>
</header>

<main class="card" role="main">
  <div class="form-card" id="formCard">

    <div class="field">
      <label for="bName">🎂 Birthday Person's Name</label>
      <input type="text" id="bName" placeholder="e.g. Priya, Rahul, Aisha…" maxlength="30" autocomplete="off"/>
    </div>

    <div class="field">
      <label for="bMsg">💌 Your Personal Message</label>
      <textarea id="bMsg" rows="3" placeholder="Write something from the heart…">Wishing you a day as magical as you are! May every dream take flight and every moment shine. Here's to you! 🌟</textarea>
    </div>

    <div class="field">
      <label>🎨 Card Theme</label>
      <div class="swatch-row" id="swatchRow" role="radiogroup" aria-label="Choose card theme">
        <div class="swatch active" data-theme="rose"   style="background:linear-gradient(135deg,#ff3cac,#784ba0)" role="radio" aria-checked="true"  tabindex="0" aria-label="Rose"></div>
        <div class="swatch"        data-theme="ocean"  style="background:linear-gradient(135deg,#2b86c5,#00d2ff)" role="radio" aria-checked="false" tabindex="0" aria-label="Ocean"></div>
        <div class="swatch"        data-theme="gold"   style="background:linear-gradient(135deg,#f7971e,#ffd200)" role="radio" aria-checked="false" tabindex="0" aria-label="Gold"></div>
        <div class="swatch"        data-theme="mint"   style="background:linear-gradient(135deg,#11998e,#38ef7d)" role="radio" aria-checked="false" tabindex="0" aria-label="Mint"></div>
        <div class="swatch"        data-theme="cosmic" style="background:linear-gradient(135deg,#8e2de2,#4a00e0)" role="radio" aria-checked="false" tabindex="0" aria-label="Cosmic"></div>
      </div>
    </div>

    <div class="field">
      <label>📸 Their Photo (optional)</label>
      <div class="photo-upload" id="photoUpload">
        <input type="file" id="photoInput" accept="image/*" aria-label="Upload photo"/>
        <img class="photo-preview" id="photoPreview" alt="Preview"/>
        <span class="upload-icon" id="uploadIcon">🖼️</span>
        <p class="upload-text"><strong>Tap to upload</strong> or drag &amp; drop</p>
      </div>
    </div>

    <div class="divider"><span>✦ READY? ✦</span></div>

    <div class="btn-group">
      <button class="btn btn-primary" id="btnPreview">🚀 Launch Surprise</button>
      <button class="btn btn-wa" id="btnWaShare">
        <svg width="18" height="18" viewBox="0 0 32 32" fill="#fff" aria-hidden="true"><path d="M16 0C7.163 0 0 7.163 0 16c0 2.822.736 5.469 2.027 7.77L.057 32l8.42-2.207A15.937 15.937 0 0016 32c8.837 0 16-7.163 16-16S24.837 0 16 0zm0 29.333a13.27 13.27 0 01-6.77-1.853l-.485-.29-5.001 1.311 1.334-4.86-.316-.5A13.287 13.287 0 012.667 16C2.667 8.636 8.636 2.667 16 2.667S29.333 8.636 29.333 16 23.364 29.333 16 29.333zm7.27-9.87c-.398-.2-2.355-1.162-2.72-1.294-.366-.133-.632-.2-.899.2-.266.398-1.031 1.294-1.264 1.56-.232.265-.465.298-.863.1-.398-.2-1.681-.619-3.202-1.976-1.183-1.056-1.98-2.36-2.213-2.758-.232-.398-.025-.613.175-.81.18-.18.398-.465.597-.698.2-.232.266-.398.398-.664.133-.265.067-.498-.033-.697-.1-.2-.899-2.165-1.231-2.963-.324-.779-.653-.674-.899-.686-.232-.01-.498-.013-.764-.013a1.468 1.468 0 00-1.063.498c-.365.398-1.397 1.365-1.397 3.329 0 1.963 1.43 3.86 1.629 4.127.2.265 2.815 4.298 6.819 6.028.953.411 1.696.657 2.276.841.956.305 1.826.262 2.514.159.767-.114 2.355-.963 2.688-1.893.333-.93.333-1.728.233-1.894-.1-.166-.365-.265-.764-.465z"/></svg>
        WhatsApp
      </button>
    </div>

    <div class="wa-section" id="waSection">
      <p>Share this link — they'll see a full 3D birthday experience! 🎉</p>
      <div class="wa-link-box" id="waLinkBox">—</div>
      <button class="btn btn-wa" id="btnWaOpen" style="width:100%;max-width:300px;margin:0 auto">
        <svg width="18" height="18" viewBox="0 0 32 32" fill="#fff" aria-hidden="true"><path d="M16 0C7.163 0 0 7.163 0 16c0 2.822.736 5.469 2.027 7.77L.057 32l8.42-2.207A15.937 15.937 0 0016 32c8.837 0 16-7.163 16-16S24.837 0 16 0zm0 29.333a13.27 13.27 0 01-6.77-1.853l-.485-.29-5.001 1.311 1.334-4.86-.316-.5A13.287 13.287 0 012.667 16C2.667 8.636 8.636 2.667 16 2.667S29.333 8.636 29.333 16 23.364 29.333 16 29.333zm7.27-9.87c-.398-.2-2.355-1.162-2.72-1.294-.366-.133-.632-.2-.899.2-.266.398-1.031 1.294-1.264 1.56-.232.265-.465.298-.863.1-.398-.2-1.681-.619-3.202-1.976-1.183-1.056-1.98-2.36-2.213-2.758-.232-.398-.025-.613.175-.81.18-.18.398-.465.597-.698.2-.232.266-.398.398-.664.133-.265.067-.498-.033-.697-.1-.2-.899-2.165-1.231-2.963-.324-.779-.653-.674-.899-.686-.232-.01-.498-.013-.764-.013a1.468 1.468 0 00-1.063.498c-.365.398-1.397 1.365-1.397 3.329 0 1.963 1.43 3.86 1.629 4.127.2.265 2.815 4.298 6.819 6.028.953.411 1.696.657 2.276.841.956.305 1.826.262 2.514.159.767-.114 2.355-.963 2.688-1.893.333-.93.333-1.728.233-1.894-.1-.166-.365-.265-.764-.465z"/></svg>
        Open WhatsApp Now
      </button>
    </div>

  </div>
</main>

<footer>Made with 💖 · Birthday Magic Maker</footer>
<div class="toast-wrap" id="toastWrap" aria-live="polite"></div>

<script>
/* STARS */
(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<120;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*2.5+.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*5}s;`;
    c.appendChild(s);
  }
})();

/* 3D TILT */
const fc=document.getElementById('formCard');
fc.addEventListener('mousemove',e=>{
  const r=fc.getBoundingClientRect(),x=(e.clientX-r.left)/r.width-.5,y=(e.clientY-r.top)/r.height-.5;
  fc.style.transform=`perspective(900px) rotateY(${x*8}deg) rotateX(${-y*8}deg)`;
});
fc.addEventListener('mouseleave',()=>{fc.style.transform='perspective(900px) rotateY(0) rotateX(0)';});

/* SWATCHES */
let selectedTheme='rose';
document.getElementById('swatchRow').addEventListener('click',e=>{
  const s=e.target.closest('.swatch');if(!s)return;
  document.querySelectorAll('.swatch').forEach(sw=>{sw.classList.remove('active');sw.setAttribute('aria-checked','false');});
  s.classList.add('active');s.setAttribute('aria-checked','true');selectedTheme=s.dataset.theme;
});

/* PHOTO */
const photoInput=document.getElementById('photoInput'),photoPreview=document.getElementById('photoPreview'),uploadIcon=document.getElementById('uploadIcon');
let photoKey='';
photoInput.addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  if(file.size>4*1024*1024){toast('⚠️ Image must be under 4 MB');return;}
  const reader=new FileReader();
  reader.onload=ev=>{
    const data=ev.target.result;
    photoPreview.src=data;photoPreview.style.display='block';uploadIcon.style.display='none';
    photoKey='bd_photo_'+Date.now();
    try{sessionStorage.setItem(photoKey,data);}catch(err){photoKey='';}
    toast('📸 Photo ready!');
  };
  reader.readAsDataURL(file);
});

/* BUILD URL */
function buildURL(){
  const name=document.getElementById('bName').value.trim();
  if(!name){toast('👆 Please enter their name first!');return null;}
  const msg=document.getElementById('bMsg').value.trim();
  const base=window.location.href.replace(/index\.html.*$/,'').replace(/\/?$/,'/');
  const params=new URLSearchParams({n:name,t:selectedTheme,m:msg});
  if(photoKey)params.set('pk',photoKey);
  return base+'birthday.html?'+params.toString();
}

/* LAUNCH */
document.getElementById('btnPreview').addEventListener('click',()=>{
  const url=buildURL();if(!url)return;
  window.open(url,'_blank');
});

/* WHATSAPP */
document.getElementById('btnWaShare').addEventListener('click',()=>{
  const url=buildURL();if(!url)return;
  const name=document.getElementById('bName').value.trim();
  const ws=document.getElementById('waSection');
  document.getElementById('waLinkBox').textContent=url;
  ws.style.display='block';ws.scrollIntoView({behavior:'smooth',block:'nearest'});
  document.getElementById('btnWaOpen').onclick=()=>{
    const text=`🎂 I made a special birthday surprise for ${name}! Open this magical link ✨\n${url}`;
    window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank');
  };
  toast('🟢 WhatsApp link ready below!');
});

/* TOAST */
function toast(msg){
  const w=document.getElementById('toastWrap'),t=document.createElement('div');
  t.className='toast';t.textContent=msg;w.appendChild(t);
  setTimeout(()=>{t.style.transition='opacity .4s';t.style.opacity='0';setTimeout(()=>t.remove(),450);},2800);
}
</script>
</body>
</html>
